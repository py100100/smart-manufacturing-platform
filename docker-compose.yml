name: smart-manufacturing-platform

services:
  mysql:
    image: mysql:8.4
    container_name: smart-manufacturing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.docker}
      MYSQL_DATABASE: ${MYSQL_DB:-smart_manufacturing}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  neo4j:
    image: neo4j:5-community
    container_name: smart-manufacturing-neo4j
    restart: unless-stopped
    environment:
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.docker}
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.docker}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $$NEO4J_USER -p $$NEO4J_PASSWORD 'RETURN 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    container_name: smart-manufacturing-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: docker
      DEBUG: "false"
      DEEPSEEK_API_KEY: ${DOCKER_DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DOCKER_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DOCKER_DEEPSEEK_MODEL:-deepseek-v4-flash}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.docker}
      MYSQL_DB: ${MYSQL_DB:-smart_manufacturing}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
      MCP_TOOL_NAME: ${MCP_TOOL_NAME:-}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      MCP_TIMEOUT_SECONDS: ${MCP_TIMEOUT_SECONDS:-5}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-true}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    container_name: smart-manufacturing-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
